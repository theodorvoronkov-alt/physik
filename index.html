<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elektronenstrahlröhre – Präsentation</title>
<style>
body{font-family:Arial,sans-serif;background:#111;color:#fff;display:flex;flex-direction:column;align-items:center;padding:20px}
.container{max-width:1000px;width:100%}
h1{text-align:center}
.card{background:#1b1b1b;border-radius:16px;padding:20px;box-shadow:0 0 20px rgba(0,0,0,.4)}
button{padding:10px 18px;margin:5px;border:none;border-radius:10px;cursor:pointer}
.active{font-weight:bold}
svg{width:100%;height:auto}
.info{text-align:center;margin-top:10px;font-size:18px}
</style>
</head>
<body>
<div class="container">
<div class="card">
<h1>Elektronenstrahlröhre</h1>
<div style="text-align:center">
<button onclick="prev()">◀</button>
<button onclick="toggleAuto()">Auto</button>
<button onclick="next()">▶</button>
</div>
<svg viewBox="0 0 800 300">
<rect x="50" y="100" width="700" height="100" rx="20" fill="none" stroke="#888"/>
<rect x="70" y="120" width="30" height="60" fill="orange"/>
<text x="60" y="95">Kathode</text>
<rect x="220" y="110" width="10" height="80" fill="#ccc"/>
<text x="200" y="95">Anode</text>
<rect x="650" y="105" width="20" height="90" fill="#0f5"/>
<text x="620" y="95">Schirm</text>
<circle id="electron" cx="110" cy="150" r="7" fill="#8af"/>
</svg>
<div class="info" id="info"></div>
</div>
</div>

<script>
const steps=[
"1. Glühkathode erzeugt Elektronen durch Glühemission.",
"2. Die Anode beschleunigt die Elektronen.",
"3. Ablenkplatten verändern die Flugbahn.",
"4. Auf dem Leuchtschirm entsteht ein sichtbarer Lichtpunkt."
];
let step=0,auto=true;
const info=document.getElementById("info");
const e=document.getElementById("electron");

function render(){
 info.textContent=steps[step];
 if(step===0){e.setAttribute("cx",110);e.setAttribute("cy",150);}
 if(step===1){e.setAttribute("cx",300);e.setAttribute("cy",150);}
 if(step===2){e.setAttribute("cx",500);e.setAttribute("cy",180);}
 if(step===3){e.setAttribute("cx",650);e.setAttribute("cy",180);}
}
function next(){step=(step+1)%4;render();}
function prev(){step=(step+3)%4;render();}
function toggleAuto(){auto=!auto;}
setInterval(()=>{if(auto)next();},2500);
render();
</script>
</body>
</html>
